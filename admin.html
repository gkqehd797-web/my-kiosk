<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 알림 수신 화면</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2f3542;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
        }
        #startBtn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #2f3542;
            background-color: #2ed573;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
        }
        #logArea {
            margin-top: 30px;
            width: 80%;
            max-width: 600px;
            height: 300px;
            background-color: #1e272e;
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            border: 1px solid #57606f;
        }
        .log-entry {
            margin-bottom: 10px;
            border-bottom: 1px solid #57606f;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <button id="startBtn">알림 수신 시작 (클릭 필수)</button>
    
    <div id="logArea">
        <div class="log-entry">시스템 대기 중... '알림 수신 시작' 버튼을 눌러주세요.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // kiosk.html과 동일한 사용자님의 Firebase 설정값을 입력해야 서로 통신할 수 있습니다.
        const firebaseConfig = {
            apiKey: "사용자님의_API_KEY",
            authDomain: "사용자님의_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://사용자님의_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "사용자님의_PROJECT_ID",
            storageBucket: "사용자님의_PROJECT_ID.appspot.com",
            messagingSenderId: "사용자님의_SENDER_ID",
            appId: "사용자님의_APP_ID"
        };

        const startBtn = document.getElementById('startBtn');
        const logArea = document.getElementById('logArea');
        let audioContext;

        // [함수 정의] 화면에 로그를 추가하는 함수입니다. 호출 시간과 메세지를 기록합니다.
        function addLog(message) {
            const now = new Date();
            const timeString = `${now.getHours()}시 ${now.getMinutes()}분 ${now.getSeconds()}초`;
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerText = `[${timeString}] ${message}`;
            
            // 새 로그를 맨 위에 추가하고, 스크롤을 맨 위로 유지합니다.
            logArea.prepend(logEntry);
        }

        // [함수 정의] 경고음을 울리는 함수입니다. 브라우저 내장 기능을 써서 별도 파일이 필요 없습니다.
        function playBeep() {
            try {
                // 오디오 컨텍스트가 없으면 생성합니다. (버튼 클릭 시 최초 1회 생성됨)
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // 소리를 합성하는 발진기(Oscillator)를 만듭니다.
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = 'sine'; // 부드러운 삐- 소리 파형
                oscillator.frequency.setValueAtTime(880, audioContext.currentTime); // 880Hz 음높이 설정
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime); // 볼륨 50%

                // 소리 발생기 -> 볼륨 조절기 -> 스피커 순서로 연결합니다.
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // 소리 재생을 시작하고 0.5초 뒤에 멈춥니다.
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (error) {
                console.error("소리 재생 실패:", error);
            }
        }

        // [함수 정의] 윈도우 바탕화면 알림을 띄우는 함수입니다.
        function showNotification() {
            try {
                if (Notification.permission === 'granted') {
                    // 권한이 있을 경우 바탕화면 알림 객체를 생성하여 화면 우측 하단에 띄웁니다.
                    new Notification("키오스크 호출 알림", {
                        body: "고객님이 데스크로 호출하셨습니다!",
                        requireInteraction: true // 사용자가 닫을 때까지 알림이 사라지지 않게 합니다.
                    });
                }
            } catch (error) {
                console.error("바탕화면 알림 띄우기 실패:", error);
            }
        }

        // '알림 수신 시작' 버튼 클릭 시 실행되는 초기화 로직입니다.
        startBtn.addEventListener('click', async () => {
            try {
                // 1. 윈도우 알림 권한을 브라우저에 요청합니다. (사용자에게 팝업창이 뜸)
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    alert("알림 권한을 허용해야 호출 메세지를 받을 수 있습니다.");
                    return;
                }

                // 2. 오디오 컨텍스트를 초기화하여 소리를 낼 준비를 마칩니다.
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 3. 버튼을 비활성화하고 상태를 변경합니다.
                startBtn.innerText = "수신 작동 중... (정상)";
                startBtn.disabled = true;
                startBtn.style.backgroundColor = "#57606f";
                addLog("시스템이 연결되었습니다. 호출 대기 중...");

                // 4. Firebase를 초기화하고 데이터베이스를 연결합니다.
                const app = initializeApp(firebaseConfig);
                const db = getDatabase(app);
                
                // 키오스크에서 데이터를 쓰는 경로와 똑같은 경로를 감시해야 합니다.
                const callReference = ref(db, 'kiosk_calls/desk_1');
                
                let isInitialLoad = true; // 새로고침 시 과거 데이터로 알림이 울리는 것을 막는 안전장치 변수

                // [핵심 로직] onValue는 해당 경로의 데이터가 바뀔 때마다 자동으로 실행되는 리스너입니다.
                onValue(callReference, (snapshot) => {
                    const data = snapshot.val();
                    
                    if (data) {
                        // 관리자 페이지를 처음 켰을 때, 과거의 데이터가 한 번 읽힙니다. 
                        // 이때는 알림을 울리지 않고 무시하도록 처리합니다.
                        if (isInitialLoad) {
                            isInitialLoad = false;
                            return; 
                        }

                        // 누군가 키오스크 버튼을 눌러 데이터가 새롭게 바뀌었을 때 실행되는 영역입니다.
                        addLog("호출이 감지되었습니다!");
                        playBeep(); // 삐- 소리 출력
                        showNotification(); // 바탕화면 팝업 알림 출력
                    }
                }, (error) => {
                    // 데이터베이스 접근 권한(Rules)이 막혀있거나 통신 에러 시 처리
                    console.error("데이터베이스 실시간 감시 실패:", error);
                    addLog("데이터베이스 통신 오류가 발생했습니다.");
                });

            } catch (error) {
                console.error("초기 설정 중 오류 발생:", error);
                addLog("초기 설정 중 오류가 발생했습니다.");
            }
        });
    </script>
</body>
</html>
